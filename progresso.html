<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Progresso — Cartório TJMT</title>
<style>
:root{--bg:#050b18;--card:#0b1828;--border:#16365a;--text:#e9f0f8;--muted:#90a6c0;
  --green:#27c06a;--greenb:#1c5e3a;--greenbg:#0a2016;
  --amber:#f5a623;--amberb:#6a4a14;--amberbg:#241a08;
  --red:#f25555;--cyan:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(1200px 700px at 50% -120px,#0c1d33 0%,var(--bg) 60%);
  color:var(--text);min-height:100vh;padding:24px 16px 60px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased;}
.wrap{max-width:680px;margin:0 auto}
.head{text-align:center;margin-bottom:28px}
.head h1{font-size:20px;font-weight:800;margin-bottom:4px}
.head p{color:var(--muted);font-size:12px}
.summary{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
.stt{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 18px;text-align:center;min-width:90px;}
.stt .n{font-size:22px;font-weight:800;display:block;line-height:1.1}
.stt .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stt.gc .n{color:var(--green)}.stt.er .n{color:var(--red)}.stt.nd .n{color:var(--muted)}
.section{margin-bottom:24px}
.section-title{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;padding-left:2px}
.row{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.row.done{border-color:var(--greenb);background:rgba(39,192,106,.04)}
.row.partial{border-color:var(--amberb);background:rgba(245,166,35,.04)}
.row.empty{opacity:.45}
.rname{flex:1;font-size:13px;font-weight:700}
.rsub{font-size:11px;color:var(--muted);margin-top:2px}
.rstat{text-align:right;flex-shrink:0}
.rstat .num{font-size:14px;font-weight:800}
.rstat .num.g{color:var(--green)}.rstat .num.a{color:var(--amber)}.rstat .num.r{color:var(--red)}
.rstat .pct{font-size:11px;color:var(--muted)}
.bar{height:4px;background:rgba(255,255,255,.07);border-radius:4px;margin-top:6px;overflow:hidden}
.barfill{height:4px;border-radius:4px}
.none{text-align:center;color:var(--muted);font-size:13px;padding:20px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.foot{text-align:center;color:var(--muted);font-size:11px;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>📊 Diagnóstico de Progresso</h1>
    <p>Lendo dados salvos neste navegador · <span id="dominio"></span></p>
  </div>
  <div class="summary" id="summary"></div>
  <div id="output"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
document.getElementById('dominio').textContent = location.hostname + location.pathname.replace(/\/[^/]*$/,'/');

const QUIZZES = [
  // Meta 9
  {g:'Meta 9 · Civil', nome:'Q54–Q68', key:'concurso_q54_q68_v2', total:15},
  {g:'Meta 9 · Civil', nome:'Q69–Q83', key:'concurso_q69_q83_v2', total:15},
  {g:'Meta 9 · Civil', nome:'Q84–Q98', key:'concurso_q84_q98_v2', total:15},
  // Meta 10
  {g:'Meta 10 · Notarial', nome:'Parte 1', key:'concurso_q130_q144_v1', total:15},
  {g:'Meta 10 · Notarial', nome:'Parte 2', key:'concurso_meta10_parte2_v1', total:15},
  {g:'Meta 10 · Notarial', nome:'Parte 3', key:'concurso_meta10_parte3_v1', total:15},
  // Meta 11
  {g:'Meta 11 · Processual Civil', nome:'Parte 1', key:'concurso_meta11_procivil_v1', total:14},
  {g:'Meta 11 · Processual Civil', nome:'Parte 2', key:'concurso_meta11_procivil_p2_v1', total:16},
  {g:'Meta 11 · Processual Civil', nome:'Parte 3', key:'concurso_meta11_procivil_p3_v1', total:15},
  // Meta 12
  {g:'Meta 12 · Direito Penal', nome:'Q1–Q15', key:'concurso_meta12_penal_q1q15_v1', total:15},
  {g:'Meta 12 · Direito Penal', nome:'Q16–Q30', key:'concurso_meta12_penal_q16q30_v1', total:15},
  {g:'Meta 12 · Direito Penal', nome:'Q31–Q45', key:'concurso_meta12_penal_q31q45_v1', total:15},
  // Meta 13
  {g:'Meta 13 · Processual Penal', nome:'Q1–Q15', key:'concurso_meta13_procpenal_q1q15_v1', total:15},
  {g:'Meta 13 · Processual Penal', nome:'Q16–Q30', key:'concurso_meta13_procpenal_q16q30_v1', total:15},
  {g:'Meta 13 · Processual Penal', nome:'Q31–Q44', key:'concurso_meta13_procpenal_q31q44_v1', total:14},
  // Meta 14
  {g:'Meta 14 · Notarial — Protesto', nome:'Q165–Q179', key:'concurso_notarial_protesto_q165q179_v1', total:15},
  {g:'Meta 14 · Notarial — Protesto', nome:'Q180–Q194', key:'concurso_meta14_protesto_cancel_certidoes_q180q194_v1', total:15},
  {g:'Meta 14 · Notarial — Protesto', nome:'Q195–Q208', key:'concurso_meta15_protesto_cartorios_q195q208_v1', total:14},
  // Meta 15
  {g:'Meta 15 · Civil — Contratos', nome:'Q108–Q122', key:'concurso_meta15_civil_contratos_q108q122_v1', total:15},
  {g:'Meta 15 · Civil — Contratos', nome:'Q123–Q137', key:'concurso_meta16_civil_contratos_q123q137_v1', total:15},
  {g:'Meta 15 · Civil — Contratos', nome:'Q138–Q152', key:'concurso_meta17_civil_contratos_q138q152_v1', total:15},
  // Meta 16
  {g:'Meta 16 · Empresarial', nome:'Q49–Q63', key:'concurso_meta16_empresarial_q49q63_v1', total:15},
  {g:'Meta 16 · Empresarial', nome:'Q86–Q99', key:'concurso_meta16_empresarial_q86q99_v1', total:8},
  {g:'Meta 16 · Empresarial', nome:'Parte 3', key:'concurso_meta16_empresarial_parte4_v1', total:15},
  // Meta 17
  {g:'Meta 17 · Notarial — RCPN/RCPJ/RTD', nome:'45 questões', key:'concurso_meta17_notarial_p375_v1', total:45},
  // Meta 18
  {g:'Meta 18 · Constitucional', nome:'Parte 1', key:'concurso_meta18_constitucional_parte1_v1', total:15},
  {g:'Meta 18 · Constitucional', nome:'Parte 2', key:'concurso_meta18_constitucional_parte2_v1', total:15},
  {g:'Meta 18 · Constitucional', nome:'Parte 3', key:'concurso_meta18_constitucional_parte3_v1', total:15},
  // Meta 19
  {g:'Meta 19 · Notarial e Registral', nome:'Parte 1', key:'concurso_meta19_notarial_parte1_v1', total:15},
  {g:'Meta 19 · Notarial e Registral', nome:'Parte 2', key:'concurso_meta19_notarial_parte2_v1', total:15},
  {g:'Meta 19 · Notarial e Registral', nome:'Parte 3', key:'concurso_meta19_notarial_parte3_v1', total:10},
  // Simulados
  {g:'Simulados', nome:'Constitucional — Intertemporal + Hermenêutica', key:'concurso_constitucional_intertemporal_hermeneutica_v1', total:null},
  {g:'Simulados', nome:'Constitucional — Hermenêutica (métodos)', key:'concurso_constitucional_hermeneutica_metodos_v1', total:null},
];

function lerDados(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const s = JSON.parse(raw);
    let respondidas=0, acertos=0, erros=0;
    if (s.respostas) {
      respondidas = Object.keys(s.respostas).length;
      const errantes = new Set(Object.keys(s.caderno||{}));
      acertos = Object.keys(s.respostas).filter(id=>!errantes.has(id)).length;
      erros = respondidas - acertos;
    } else if (s.resp) {
      respondidas = Object.keys(s.resp).length;
      acertos = respondidas; erros = 0;
    }
    return {respondidas, acertos, erros, raw: Object.keys(s).join(',')};
  } catch(e) { return null; }
}

// Scan for any extra keys
function extraKeys() {
  const known = new Set(QUIZZES.map(q=>q.key));
  const extra = [];
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!known.has(k) && k !== 'provaoral_auth' && k !== 'provaoral_auth2') {
      extra.push(k);
    }
  }
  return extra;
}

function render() {
  let totalAc=0, totalEr=0, totalResp=0, totalQ=0, grupos={};
  const out = document.getElementById('output');

  QUIZZES.forEach(q => {
    if (!grupos[q.g]) grupos[q.g] = [];
    const d = lerDados(q.key);
    grupos[q.g].push({...q, d});
    if (d) { totalAc+=d.acertos; totalEr+=d.erros; totalResp+=d.respondidas; }
    if (q.total) totalQ+=q.total;
  });

  // Summary
  const pct = totalResp>0 ? Math.round(totalAc/totalResp*100) : 0;
  document.getElementById('summary').innerHTML = `
    <div class="stt gc"><span class="n">${totalAc}</span><span class="l">Acertos</span></div>
    <div class="stt er"><span class="n">${totalEr}</span><span class="l">Erros</span></div>
    <div class="stt"><span class="n" style="color:var(--cyan)">${totalResp}</span><span class="l">Respondidas</span></div>
    <div class="stt nd"><span class="n">${totalQ-totalResp}</span><span class="l">Pendentes</span></div>
    ${totalResp>0?`<div class="stt"><span class="n" style="color:${pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)'}">${pct}%</span><span class="l">Aproveitamento</span></div>`:''}
  `;

  let html = '';
  let algumDado = false;

  Object.entries(grupos).forEach(([grupo, items]) => {
    html += `<div class="section"><div class="section-title">${grupo}</div>`;
    let algum = false;
    items.forEach(item => {
      const d = item.d;
      if (!d && item.total===null) {
        html += `<div class="row empty"><div><div class="rname">${item.nome}</div><div class="rsub">Sem dados salvos</div></div></div>`;
        return;
      }
      if (!d) {
        html += `<div class="row empty"><div><div class="rname">${item.nome}</div><div class="rsub">Não iniciado</div></div><div class="rstat"><span class="num" style="color:var(--muted)">0/${item.total}</span></div></div>`;
        return;
      }
      algum = true; algumDado = true;
      const total = item.total || d.respondidas;
      const pct2 = total>0 ? Math.round(d.respondidas/total*100) : 0;
      const ap = d.respondidas>0 ? Math.round(d.acertos/d.respondidas*100) : 0;
      const cls = d.respondidas===total?'done':d.respondidas>0?'partial':'';
      const ncls = ap>=70?'g':ap>=50?'a':'r';
      const fillClr = ap>=70?'var(--green)':ap>=50?'var(--amber)':'var(--red)';
      html += `<div class="row ${cls}">
        <div style="flex:1">
          <div class="rname">${item.nome}</div>
          <div class="rsub">${d.respondidas===total?'✓ Concluído':'Em andamento'} · ${d.respondidas}/${total} respondidas</div>
          ${item.total?`<div class="bar"><div class="barfill" style="width:${pct2}%;background:${fillClr}"></div></div>`:''}
        </div>
        <div class="rstat">
          <div class="num ${ncls}">${d.acertos}✓ ${d.erros}✗</div>
          <div class="pct">${d.respondidas>0?ap+'% acertos':''}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  // Extra keys
  const extras = extraKeys();
  if (extras.length) {
    html += `<div class="section"><div class="section-title">Outras chaves encontradas</div>`;
    extras.forEach(k => {
      const raw = localStorage.getItem(k);
      html += `<div class="row"><div><div class="rname" style="font-size:11px;color:var(--cyan)">${k}</div><div class="rsub">${raw?raw.slice(0,80)+'…':''}</div></div></div>`;
    });
    html += '</div>';
  }

  if (!algumDado && !extras.length) {
    html = `<div class="none">Nenhum progresso encontrado neste navegador.<br><br>Os dados ficam salvos no browser onde você respondeu às questões.</div>`;
  }

  out.innerHTML = html;
  document.getElementById('foot').textContent =
    `${localStorage.length} chave(s) total no localStorage deste domínio`;
}

render();
</script>
</body>
</html>
