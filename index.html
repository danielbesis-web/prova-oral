<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova Oral — 2ª Fase · Cartório TJMT</title>
<style>
:root{
  --bg:#050b18;--card:#0b1828;--border:#16365a;
  --text:#e9f0f8;--muted:#90a6c0;--soft:#b9c8dc;
  --cyan:#38bdf8;--cyanb:#155a72;--purple:#b06bf2;--purpleb:#432a6e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(1200px 700px at 50% -120px,#0c1d33 0%,var(--bg) 60%);
  color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased;padding:24px;
}
.wrap{max-width:420px;width:100%}
.head{text-align:center;margin-bottom:36px}
.head .icon{font-size:40px;display:block;margin-bottom:12px}
.head h1{font-size:22px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.head p{color:var(--muted);font-size:13px}

.cards{display:flex;flex-direction:column;gap:14px}
.ccard{
  display:flex;align-items:center;gap:16px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px 24px;text-decoration:none;color:var(--soft);
  transition:.14s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.ccard:hover{border-color:var(--cyanb);background:rgba(56,189,248,.07);color:var(--text)}
.ccard .icon{font-size:28px;flex-shrink:0}
.ccard .info .nome{font-size:16px;font-weight:800;color:var(--text);margin-bottom:3px}
.ccard .info .sub{font-size:12px;color:var(--muted)}
.ccard .arrow{margin-left:auto;color:var(--muted);font-size:20px}

.end{text-align:center;color:var(--muted);font-size:11px;margin-top:32px}
</style>
</head>
<body>
<script>
(function(){var s=localStorage.getItem('provaoral_auth');if(!s){location.replace('login.html');return;}try{var d=JSON.parse(s);if(!d.exp||Date.now()>d.exp){localStorage.removeItem('provaoral_auth');location.replace('login.html');}}catch(e){location.replace('login.html');}})();
</script>
<div style="position:fixed;top:12px;right:14px;z-index:999">
<button onclick="localStorage.removeItem('provaoral_auth');location.replace('login.html')" style="background:#0b1828;border:1px solid #16365a;color:#90a6c0;font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;font-family:inherit">Sair</button>
</div>

<div class="wrap">
  <div class="head">
    <span class="icon">🏛️</span>
    <h1>Prova Oral · 2ª Fase</h1>
    <p>Concurso Cartório · TJMT</p>
  </div>

  <div class="cards">
    <a class="ccard" href="metas.html">
      <span class="icon">📚</span>
      <div class="info">
        <div class="nome">Metas</div>
        <div class="sub">Central de questões · Banco de metas</div>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="ccard" href="simulados.html">
      <span class="icon">📋</span>
      <div class="info">
        <div class="nome">Simulados</div>
        <div class="sub">Simulados por disciplina e semana</div>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="ccard" href="progresso.html">
      <span class="icon">📊</span>
      <div class="info">
        <div class="nome">Meu Progresso</div>
        <div class="sub">Diagnóstico completo · Acertos e erros por meta</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <div class="end">Acesso restrito · Cartório 3º Ofício de Cuiabá</div>
</div>
</body>
</html>
